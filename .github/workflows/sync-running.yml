name: Sync running data

# Pulls running_page's published activities feed and refreshes running/data.json.
# Credential-free by design: the published feed is the boundary, the upstream
# Keep login is never touched.

on:
  schedule:
    - cron: '17 20 * * *'   # daily, 04:17 Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch activities
        run: wget -q -O /tmp/activities.json https://zhenghe-md.github.io/running_page/activities.json

      - name: Filter into running/data.json
        run: jq -f scripts/filter-activities.jq /tmp/activities.json > running/data.json

      - name: Sanity-check output
        run: |
          count=$(jq 'length' running/data.json)
          echo "records: $count"
          if [ "$count" -lt 100 ]; then
            echo "::error::Suspiciously few records ($count) — refusing to commit."
            exit 1
          fi

      - name: Commit if changed
        run: |
          if git diff --quiet running/data.json; then
            echo "No change."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add running/data.json
          git commit -m "chore: sync running data"
          git push
