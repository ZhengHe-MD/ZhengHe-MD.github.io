    <h1>关于我</h1>
    <div class="prose">
      <p>我叫郑鹤，一名软件工程师。写过不少关于分布式系统、调用链追踪与存储引擎的文字，也喜欢把想法直接做成能跑起来的东西——不管是一个解释器、一个跟读工具，还是一条陪跑二十年的进度条。</p>
      <p>我给自己定了一个很长的目标：<a href="/running/">在 2048 年前用双脚跑完 40,075 公里</a>，也就是赤道的周长。它和写作是同一件事的两面——都相信长期的、缓慢的积累。</p>
      <p>这个网站是我所有公开表达的唯一入口，取代了此前散落各处的博客、跑步仪表盘和讲稿。我把 HTML 当作第一手稿，让每一页都能承载它需要的任何交互。</p>
      <p>如果你对其中任何内容感兴趣，欢迎通过<a href="mailto:ranchardzheng@gmail.com">邮件</a>或 <a href="https://github.com/ZhengHe-MD">GitHub</a> 找到我。</p>
    </div>
